<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Recolor Rescue</title>
    <style>
      :root {
        --dark: #7c63d7;
        --light: #a9f8b3;
        --qr-op: 0.68;
        --qr-filter: saturate(6.5) hue-rotate(152deg) contrast(0.08) brightness(1.32) blur(11.5px);
        --qr-transform: scale(1.14) rotate(3.8deg) skew(4.8deg, -3.6deg);
      }
      body { font-family: ui-monospace, Menlo, Consolas, monospace; margin: 24px; background: #f4f7ff; color: #18212f; }
      .wrap { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
      .panel { background: white; border: 1px solid #d5deef; border-radius: 10px; padding: 14px; max-width: 560px; }
      .qr {
        padding: 16px;
        background: linear-gradient(180deg, #f7f0ff, #fff6c8);
        border-radius: 12px;
        border: 1px solid #d7cfff;
        position: relative;
        overflow: hidden;
      }
      .qr::before {
        content: "";
        position: absolute;
        inset: -8px;
        background:
          radial-gradient(circle at 15% 20%, rgba(255, 80, 160, .35), transparent 48%),
          radial-gradient(circle at 80% 25%, rgba(70, 255, 170, .32), transparent 44%),
          radial-gradient(circle at 45% 75%, rgba(80, 130, 255, .30), transparent 52%);
        filter: blur(3px) saturate(1.5);
        pointer-events: none;
      }
      .qr svg {
        width: 294px;
        height: 294px;
        opacity: var(--qr-op);
        filter: var(--qr-filter);
        transform: var(--qr-transform);
        transform-origin: center;
      }
      .qr::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 22% 24%, rgba(255,255,255,.34), rgba(0,0,0,.44) 56%, transparent 72%),
          radial-gradient(circle at 78% 68%, rgba(255,255,255,.30), rgba(0,0,0,.46) 60%, transparent 74%),
          repeating-linear-gradient(12deg, rgba(255,255,255,.52) 0 2px, rgba(0,0,0,.36) 2px 4px),
          repeating-linear-gradient(-14deg, rgba(255,255,255,.46) 0 3px, rgba(0,0,0,.34) 3px 6px);
        pointer-events: none;
        mix-blend-mode: color-burn;
      }
      .d { fill: var(--dark); }
      .l { fill: var(--light); }
      .small { opacity: .8; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>QR Recolor Rescue</h1>
    <div class="wrap">
      <div class="panel">
        <p>This is a real QR payload, but its current styling is intentionally unfriendly to scanners.</p>
        <p>Hint: the payload is recoverable if you experiment with the page styles.</p>
        <p class="small">DevTools can be useful here.</p>
      </div>
