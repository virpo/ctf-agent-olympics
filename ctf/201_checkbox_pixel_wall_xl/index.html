<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkbox Pixel Wall XL</title>
    <style>
      :root {
        --bg: #f3efe5;
        --ink: #1f2937;
        --panel: #fff;
        --pixel-size: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: var(--ink);
        background: linear-gradient(180deg, #fff8e1 0%, var(--bg) 65%);
      }

      main {
        max-width: 1400px;
        margin: 0 auto;
        padding: 28px 18px 42px;
      }

      h1 { margin-top: 0; }

      .note {
        margin: 0 0 18px;
        padding: 12px;
        border: 1px solid #d3c8b2;
        background: #fffdf7;
      }

      .shell {
        display: flex;
        align-items: center;
        gap: 14px;
        overflow-x: auto;
        border: 1px dashed #d3c8b2;
        background: var(--panel);
        padding: 10px;
      }

      .brace {
        font-size: 34px;
        font-weight: 700;
        white-space: nowrap;
      }

      #wall {
        display: grid;
        gap: 1px;
      }

      .pixel {
        width: var(--pixel-size);
        height: var(--pixel-size);
        margin: 0;
        cursor: pointer;
        accent-color: #111827;
      }

      .pixel.rejected {
        outline: 2px solid #d97706;
      }

      #status {
        margin-top: 12px;
        min-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Checkbox Pixel Wall XL</h1>
      <p class="note">
        Same rules, many more boxes. If this feels repetitive, that's because it is.
      </p>

      <div class="shell">
        <span class="brace">flag{</span>
        <div id="wall" aria-label="xl checkbox wall"></div>
        <span class="brace">}</span>
      </div>

      <p id="status"></p>
    </main>

    <script src="./wall_config.js"></script>
    <script>
      const cfg = (window.__wallCfg && Array.isArray(window.__wallCfg.allow_hashes))
        ? window.__wallCfg
        : { rows: 0, cols: 0, salt: "", allow_hashes: [] };
      const wall = document.getElementById("wall");
      const status = document.getElementById("status");
      const allowedHashes = new Set(cfg.allow_hashes.map(Number));
      const pixels = [];

      function fnv1a32(text) {
        let h = 0x811c9dc5;
        for (let i = 0; i < text.length; i++) {
          h ^= text.charCodeAt(i);
          h = Math.imul(h, 0x01000193) >>> 0;
        }
        return h >>> 0;
      }

      function isStablePixel(idx) {
        return allowedHashes.has(fnv1a32(`${idx}:${cfg.salt}`));
      }

      const stable = new Set();
      for (let idx = 0; idx < cfg.rows * cfg.cols; idx++) {
        if (isStablePixel(idx)) {
          stable.add(idx);
        }
      }

      function flashReject(el) {
        el.classList.add("rejected");
        setTimeout(() => el.classList.remove("rejected"), 120);
      }

      function updateStatus() {
        let on = 0;
        for (const idx of stable) {
          if (pixels[idx].checked) {
            on += 1;
          }
        }
        let text = `Stable pixels on: ${on} / ${stable.size}`;
        if (on === stable.size) {
          text += "  Done. Read the wall.";
        }
        status.textContent = text;
      }

      wall.style.gridTemplateColumns = `repeat(${cfg.cols}, var(--pixel-size))`;
      for (let idx = 0; idx < cfg.rows * cfg.cols; idx++) {
        const input = document.createElement("input");
        input.type = "checkbox";
        input.className = "pixel";
        input.dataset.idx = String(idx);
        input.addEventListener("change", () => {
          if (!stable.has(idx)) {
            input.checked = false;
            flashReject(input);
          }
          updateStatus();
        });
        wall.appendChild(input);
        pixels.push(input);
      }

      updateStatus();
    </script>
  </body>
</html>
