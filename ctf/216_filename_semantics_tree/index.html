<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Depth + Created Sort Tree</title>
    <style>
      body { font-family: ui-monospace, Menlo, Consolas, monospace; margin: 24px; background: #f8fafc; color: #1e293b; }
      .card { background: #fff; border: 1px solid #d8e2ef; border-radius: 10px; padding: 14px; max-width: 860px; }
      code { background: #eef2ff; border-radius: 4px; padding: 2px 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Depth + Created Sort Tree</h1>
      <p>Inspect files under <code>challenge/tree/</code>.</p>
      <p>Rule:</p>
      <ol>
        <li>Take only files exactly 5 folders deep.</li>
        <li>Inside each file, keep only <code>status=KEEP</code>.</li>
        <li>Sort by <code>created_at</code> value from file content.</li>
        <li>Concatenate <code>piece</code>.</li>
      </ol>
      <p>Totally possible by hand. Extremely annoying by hand.</p>
    </div>
  </body>
</html>
